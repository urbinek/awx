---
- name: Aktualizacja MikroTik RouterOS przez API
  hosts: all
  connection: local
  gather_facts: false
  serial: 1

  vars:
    mikrotik_api_auth_header: "Basic {{ ( mikrotik_user + ':' + mikrotik_password ) | b64encode }}"
    mikrotik_update_channel: stable
    common_headers:
      Authorization: "{{ mikrotik_api_auth_header }}"
      Accept-Encoding: "identity"
      Connection: "close"
      User-Agent: "curl/7.81.0"

  tasks:
    - name: 0. Sprawdzenie dostępności hosta (Port 443)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 443
        state: started
        connect_timeout: 3
        timeout: 10
      register: port_check
      ignore_errors: true

    - name: Ustawienie flagi dostępności
      ansible.builtin.set_fact:
        host_is_up: "{{ not port_check.failed | default(false) }}"

    - name: 1. Pobranie informacji o wersji
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/package/update"
        method: GET
        headers: "{{ common_headers }}"
        validate_certs: false
      register: current_status
      when: host_is_up | bool

    - name: PROCES AKTUALIZACJI
      block:
        - name: 2. Odświeżenie listy aktualizacji
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/check-for-updates"
            method: POST
            headers: "{{ common_headers | combine({'Content-Type': 'application/json'}) }}"
            body: { "without-paging": "" }
            body_format: json
            validate_certs: false

        - name: 3. Pobieranie plików
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/download"
            method: POST
            headers: "{{ common_headers }}"
            timeout: 120
            validate_certs: false
          register: download_trigger
          when: current_status.json.status == "New version is available"

        - name: 4. Weryfikacja gotowości do restartu
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: final_check
          retries: 10
          delay: 5
          until: 
            - final_check.json.status is defined
            - "final_check.json.status is search('reboot') or final_check.json.status is search('up to date')"

        - name: 5. Restart urządzenia
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/reboot"
            method: POST
            headers: "{{ common_headers }}"
            validate_certs: false
          register: reboot_res
          async: 10
          poll: 0
          when: "final_check.json.status is search('reboot')"

        - name: 6. Oczekiwanie na powrót po aktualizacji
          ansible.builtin.wait_for:
            host: "{{ inventory_hostname }}"
            port: 443
            state: started
            delay: 60
            timeout: 450
          when: reboot_res is changed
          delegate_to: localhost

      when: 
        - host_is_up | bool
        - current_status.json is defined
        - current_status.json.status != "System is already up to date"
