---
- name: Aktualizacja MikroTik RouterOS przez API
  hosts: all
  connection: local
  gather_facts: false
  serial: 1

  vars:
    mikrotik_api_auth_header: "Basic {{ ( mikrotik_user + ':' + mikrotik_password ) | b64encode }}"
    mikrotik_update_channel: stable
    common_headers:
      Authorization: "{{ mikrotik_api_auth_header }}"
      Accept-Encoding: "identity"
      Connection: "close"
      User-Agent: "curl/7.81.0"

  tasks:
    - name: 0. Sprawdzenie dostępności hosta (Port 443)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 443
        state: started
        connect_timeout: 3
        timeout: 5
      register: port_check
      ignore_errors: true

    - name: Ustawienie flagi dostępności
      ansible.builtin.set_fact:
        host_is_up: "{{ not port_check.failed | default(false) }}"

    - name: PROCES AKTUALIZACJI
      block:
        - name: 1. Pobranie informacji o obecnej wersji i statusie
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: current_status

        - name: LOG - Stan początkowy urządzenia
          ansible.builtin.debug:
            msg: 
              - "Host: {{ inventory_hostname }}"
              - "Zainstalowana wersja: {{ current_status.json['installed-version'] | default('Brak danych') }}"
              - "Najnowsza dostępna: {{ current_status.json['latest-version'] | default('Brak danych') }}"
              - "Status API: {{ current_status.json.status | default('Brak danych') }}"

        - name: 2. Wymuszenie kanału '{{ mikrotik_update_channel }}'
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/set"
            method: POST
            headers: "{{ common_headers | combine({'Content-Type': 'application/json'}) }}"
            body:
              channel: "{{ mikrotik_update_channel }}"
            body_format: json
            validate_certs: false
          register: set_channel
          when: current_status.json.channel | default('') != mikrotik_update_channel

        - name: 3. Sprawdzenie aktualizacji (odświeżenie)
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/check-for-updates"
            method: POST
            headers: "{{ common_headers | combine({'Content-Type': 'application/json'}) }}"
            body: { "without-paging": "" }
            body_format: json
            validate_certs: false
          register: refresh_check

        - name: 4. Oczekiwanie na gotowość statusu (pętla)
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: update_info
          retries: 10
          delay: 5
          until: 
            - update_info.status == 200
            - "'finding' not in (update_info.json.status | default(''))"

        - name: 5. Pobieranie plików (jeśli wymagane)
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/download"
            method: POST
            headers: "{{ common_headers }}"
            timeout: 120
            validate_certs: false
          register: download_res
          when: update_info.json.status == "New version is available"

        - name: LOG - Status po próbie pobrania
          ansible.builtin.debug:
            msg: "Aktualny status po kroku download: {{ update_info.json.status }}"

        - name: 6. Restart (jeśli pakiety są gotowe do instalacji)
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/reboot"
            method: POST
            headers: "{{ common_headers }}"
            validate_certs: false
          register: reboot_res
          # Restartujemy jeśli: pobraliśmy pakiety przed chwilą LUB już wcześniej tam były
          when: >
            (download_res is changed) or 
            (update_info.json.status == "Downloaded, please reboot router to upgrade it")
          async: 10
          poll: 0

        - name: 7. Oczekiwanie na powrót urządzenia
          ansible.builtin.wait_for:
            host: "{{ inventory_hostname }}"
            port: 443
            state: started
            delay: 45
            timeout: 400
          when: reboot_res is changed
          delegate_to: localhost

        - name: LOG - Wynik końcowy
          ansible.builtin.debug:
            msg: "Aktualizacja zakończona pomyślnie dla {{ inventory_hostname }}"
          when: reboot_res is changed

      when: host_is_up
