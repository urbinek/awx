---
- name: Aktualizacja MikroTik RouterOS przez API
  hosts: all
  connection: local
  gather_facts: false
  serial: 1

  vars:
    mikrotik_api_auth_header: "Basic {{ ( mikrotik_user + ':' + mikrotik_password ) | b64encode }}"
    mikrotik_update_channel: stable
    common_headers:
      Authorization: "{{ mikrotik_api_auth_header }}"
      Accept-Encoding: "identity"
      Connection: "close"
      User-Agent: "curl/7.81.0"

  tasks:
    - name: 0. Sprawdzenie dostępności hosta (Port 443)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 443
        state: started
        connect_timeout: 3
        timeout: 10
      register: port_check
      [cite_start]ignore_errors: true [cite: 103]

    - name: Ustawienie flagi dostępności
      ansible.builtin.set_fact:
        [cite_start]host_is_up: "{{ not port_check.failed | default(false) }}" [cite: 47]

    - name: 1. Pobranie informacji o wersji (zawsze, jeśli host żyje)
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/package/update"
        method: GET
        headers: "{{ common_headers }}"
        validate_certs: false
      register: current_status
      [cite_start]when: host_is_up [cite: 104]

    - name: LOG - Stan urządzenia
      ansible.builtin.debug:
        msg: 
          - "Host: {{ inventory_hostname }}"
          - "Wersja: {{ current_status.json['installed-version'] | default('N/A') }}"
          - "Status: {{ current_status.json.status | default('N/A') }}"
      [cite_start]when: host_is_up and current_status.json is defined [cite: 48]

    - name: PROCES AKTUALIZACJI
      block:
        - name: 2. Odświeżenie listy aktualizacji
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/check-for-updates"
            method: POST
            headers: "{{ common_headers | combine({'Content-Type': 'application/json'}) }}"
            body: { "without-paging": "" }
            body_format: json
            [cite_start]validate_certs: false [cite: 49, 98]

        - name: 3. Pobieranie plików
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/download"
            method: POST
            headers: "{{ common_headers }}"
            timeout: 120
            validate_certs: false
          register: download_trigger
          [cite_start]when: current_status.json.status == "New version is available" [cite: 99, 106]

        - name: 4. Weryfikacja gotowości do restartu
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: final_check
          retries: 10
          delay: 5
          [cite_start]until: "final_check.json.status is search('reboot') or final_check.json.status is search('up to date')" [cite: 92, 106]

        - name: 5. Restart urządzenia
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/reboot"
            method: POST
            headers: "{{ common_headers }}"
            validate_certs: false
          register: reboot_res
          async: 10
          poll: 0
          [cite_start]when: final_check.json.status is search('reboot') [cite: 58, 65, 86]

        - name: 6. Oczekiwanie na powrót po aktualizacji
          ansible.builtin.wait_for:
            host: "{{ inventory_hostname }}"
            port: 443
            state: started
            delay: 60
            timeout: 450
          when: reboot_res is changed
          [cite_start]delegate_to: localhost [cite: 101, 108]

      when: 
        - host_is_up
        - current_status.json is defined
        - [cite_start]current_status.json.status != "System is already up to date" [cite: 90, 93, 112]
