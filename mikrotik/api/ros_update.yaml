---
- name: "Aktualizacja MikroTik RouterOS przez API"
  hosts: all
  connection: local
  gather_facts: false
  serial: 1

  vars:
    mikrotik_api_auth_header: "Basic {{ ( mikrotik_user + ':' + mikrotik_password ) | b64encode }}"
    mikrotik_update_channel: stable
    common_headers:
      Authorization: "{{ mikrotik_api_auth_header }}"
      Accept-Encoding: "identity"
      Connection: "close"
      User-Agent: "curl/7.81.0"

  tasks:
    - name: "0. Sprawdzenie dostępności hosta (Port 443)"
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 443
        state: started
        connect_timeout: 5
        timeout: 10
      register: port_check
      ignore_errors: true

    - name: "Ustawienie flagi dostępności"
      ansible.builtin.set_fact:
        host_is_up: "{{ not port_check.failed | default(false) }}"

    - name: "PROCES AKTUALIZACJI"
      block:
        - name: "1. Ustawienie kanału aktualizacji na '{{ mikrotik_update_channel }}'"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/set"
            method: POST
            headers: "{{ common_headers | combine({'Content-Type': 'application/json'}) }}"
            body: { "channel": "{{ mikrotik_update_channel }}" }
            body_format: json
            validate_certs: false
          register: set_channel_res

        - name: "DEBUG - Response: Set Channel"
          ansible.builtin.debug:
            var: set_channel_res.json

        - name: "2. Odświeżenie informacji o aktualizacjach"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/check-for-updates"
            method: POST
            headers: "{{ common_headers | combine({'Content-Type': 'application/json'}) }}"
            body: { "without-paging": "" }
            body_format: json
            validate_certs: false
          register: check_updates_res

        - name: "DEBUG - Response: Check Updates"
          ansible.builtin.debug:
            var: check_updates_res.json

        - name: "3. Sprawdzenie statusu przed pobieraniem"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: initial_status

        - name: "DEBUG - Response: Initial Status"
          ansible.builtin.debug:
            var: initial_status.json

        - name: "ZAKOŃCZ JEŚLI AKTUALNY"
          ansible.builtin.meta: end_host
          when: "initial_status.json.status is defined and 'already up to date' in initial_status.json.status"

        - name: "4. Pobieranie najnowszej wersji"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update/download"
            method: POST
            headers: "{{ common_headers }}"
            timeout: 150
            validate_certs: false
          register: download_res

        - name: "DEBUG - Response: Download"
          ansible.builtin.debug:
            var: download_res.json

        - name: "5. Pętla: Oczekiwanie na gotowość do restartu (max 3 próby)"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: wait_ready
          retries: 3
          delay: 5
          until: "wait_ready.json.status is defined and 'reboot' in wait_ready.json.status"

        - name: "DEBUG - Response: Final Wait Status"
          ansible.builtin.debug:
            var: wait_ready.json

        - name: "6. Wykonanie restartu"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/reboot"
            method: POST
            headers: "{{ common_headers }}"
            validate_certs: false
          register: reboot_res
          when: "wait_ready.json.status is defined and 'reboot' in wait_ready.json.status"

        - name: "7. Pętla: Oczekiwanie na uruchomienie i weryfikacja wersji (max 10 prób)"
          ansible.builtin.uri:
            url: "https://{{ inventory_hostname }}/rest/system/package/update"
            method: GET
            headers: "{{ common_headers }}"
            validate_certs: false
          register: post_reboot_status
          retries: 10
          delay: 30
          until: "post_reboot_status.status == 200 and 'already up to date' in (post_reboot_status.json.status | default(''))"
          when: reboot_res is changed

        - name: "DEBUG - Response: Post-Reboot Status"
          ansible.builtin.debug:
            var: post_reboot_status.json
          when: reboot_res is changed

      when: host_is_up | bool
