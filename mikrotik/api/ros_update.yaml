---
- name: Aktualizacja MikroTik RouterOS przez API
  hosts: all
  order: reverse_sorted
  serial: 1
  connection: local  # Wykonywane na workerze, nie na routerze
  gather_facts: false

  vars:
    mikrotik_api_auth_header: "Basic {{ ( mikrotik_user + ':' + mikrotik_password ) | b64encode }}"
    mikrotik_update_chanel: stable

  tasks:
    - name: Ustawienie kanału aktualizacji
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/package/update/set"
        method: POST
        headers:
          Authorization: "{{ mikrotik_api_auth_header }}"
          Content-Type: 'application/json'
          User-Agent: "curl/7.81.0"
        body:
          channel: "{{ mikrotik_update_chanel }}"
        body_format: json
        timeout: 15
        validate_certs: false
      register: set_channel

    - name: Odświeżenie informacji o aktualizacjach
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/package/update/check-for-updates"
        method: POST
        headers:
          Authorization: "{{ mikrotik_api_auth_header }}"
          Content-Type: 'application/json'
          User-Agent: "curl/7.81.0"
        body:
          without-paging: ""
        body_format: json
        timeout: 15
        validate_certs: false
      register: check_for_updates

    - name: Pobranie statusu (oczekiwanie na odpowiedź serwera)
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/package/update"
        method: GET
        headers:
          Authorization: "{{ mikrotik_api_auth_header }}"
          Accept-Encoding: "identity"
          User-Agent: "curl/7.81.0"
        timeout: 15
        validate_certs: false
      register: get_status
      failed_when: false
      retries: 10
      delay: 5
      until: 
        - get_status.status == 200
        - get_status.json is defined
        - "'finding' not in (get_status.json.status | default(''))"

    - name: Pobierz aktualizacje
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/package/update/download"
        method: POST
        headers:
          Authorization: "{{ mikrotik_api_auth_header }}"
          User-Agent: "curl/7.81.0"
        timeout: 60  # Zwiększony timeout na pobieranie plików przez router
        validate_certs: false
      register: install_result
      # Pobieramy tylko gdy status to "New version is available"
      when: get_status.json.status is defined and get_status.json.status == "New version is available"

    - name: Zrestartuj urządzenie
      ansible.builtin.uri:
        url: "https://{{ inventory_hostname }}/rest/system/reboot"
        method: POST
        headers:
          Authorization: "{{ mikrotik_api_auth_header }}"
          User-Agent: "curl/7.81.0"
        timeout: 15
        validate_certs: false
      # Restartujemy jeśli pobrano pakiety TERAZ lub pakiety już czekają (Downloaded)
      when: >
        (install_result is changed) or 
        (get_status.json.status | default('') == "Downloaded, please reboot router to upgrade it")
      async: 20
      poll: 0
      register: reboot_triggered

    - name: Oczekiwanie na ponowne uruchomienie (port 80)
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 80
        state: started
        delay: 30
        timeout: 300
      when: reboot_triggered is changed
      delegate_to: localhost
